<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>filles.ai — Le domaine de vos désirs</title>
  <meta name="description" content="filles.ai — Le domaine parfait pour une IA compagne, une expérience immersive, une plateforme de fantasmes." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --rose:   #f472b6;
      --violet: #a855f7;
      --dark:   #17102a;
      --border: rgba(255,255,255,0.10);
      --text:   #f1f0f5;
      --muted:  #a89fbf;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--dark);
      color: var(--text);
      font-family: 'Inter', sans-serif;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0;
    }

    .blob {
      position: fixed; border-radius: 50%;
      filter: blur(110px); opacity: 0.32;
      pointer-events: none; z-index: 0;
    }
    .blob-1 { width: 700px; height: 700px; background: var(--violet); top: -200px; left: -150px; animation: drift 18s ease-in-out infinite alternate; }
    .blob-2 { width: 500px; height: 500px; background: var(--rose); bottom: -100px; right: -100px; animation: drift 22s ease-in-out infinite alternate-reverse; }
    @keyframes drift { from{transform:translate(0,0)} to{transform:translate(40px,30px)} }

    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: 24px 56px;
      display: flex; align-items: center;
      background: linear-gradient(to bottom, rgba(23,16,42,0.97), transparent);
    }
    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem; font-weight: 700;
      background: linear-gradient(135deg, #fff 0%, var(--rose) 60%, var(--violet) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    .hero {
      position: relative; z-index: 1;
      height: 100vh;
      display: grid; grid-template-columns: 1fr 1fr;
      align-items: center;
      padding: 100px 56px 48px;
      gap: 56px;
    }

    .hero-content {
      display: flex; flex-direction: column;
      height: 70vh;
    }

    .pill {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 0.68rem; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase;
      color: #4ade80;
      background: rgba(74,222,128,0.12);
      border: 1px solid rgba(74,222,128,0.3);
      padding: 7px 16px; border-radius: 100px;
      margin-bottom: 20px;
      align-self: flex-start;
    }
    .pill::before {
      content: ''; width: 6px; height: 6px;
      background: #4ade80; border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.8)} }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3.2rem, 5.5vw, 5.2rem);
      font-weight: 700; line-height: 1.0;
      letter-spacing: -0.02em;
      margin-bottom: 10px;
    }
    h1 .domain {
      background: linear-gradient(135deg, #fff 0%, var(--rose) 55%, var(--violet) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      display: block;
    }
    h1 .tagline {
      display: block;
      font-style: italic;
      font-size: 0.44em; font-weight: 400;
      color: var(--rose); -webkit-text-fill-color: var(--rose);
      margin-top: 10px;
    }

    .domain-badge {
      display: inline-block;
      font-size: 0.68rem; font-weight: 700; letter-spacing: 0.1em;
      color: #10b981;
      background: rgba(16,185,129,0.10);
      border: 1px solid rgba(16,185,129,0.25);
      padding: 4px 12px; border-radius: 100px;
      margin: 14px 0 18px;
    }

    .hero-desc {
      font-size: 0.95rem; line-height: 1.78;
      color: var(--muted); margin-bottom: 28px; max-width: 440px;
    }

    .contact-form {
      display: flex; flex-direction: column; gap: 12px;
      width: 100%; max-width: 400px;
      margin-top: auto;
    }
    .contact-form input,
    .contact-form textarea {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 13px 16px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.88rem;
      outline: none;
      transition: border-color 0.2s;
      resize: none;
    }
    .contact-form input::placeholder,
    .contact-form textarea::placeholder { color: var(--muted); }
    .contact-form input:focus,
    .contact-form textarea:focus { border-color: rgba(168,85,247,0.6); }

    .btn-primary {
      display: inline-flex; align-items: center; justify-content: center; gap: 10px;
      background: linear-gradient(135deg, var(--rose), var(--violet));
      color: #fff; font-weight: 600; font-size: 0.9rem;
      padding: 15px 32px; border-radius: 12px;
      border: none; cursor: pointer; text-decoration: none;
      transition: opacity 0.2s, transform 0.2s;
      box-shadow: 0 8px 36px rgba(168,85,247,0.4);
    }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-2px); }

    .hero-images {
      position: relative;
      display: grid; grid-template-columns: 1fr; gap: 12px;
      height: 70vh;
    }
    .img-wrap {
      border-radius: 18px; overflow: hidden;
      box-shadow: 0 24px 60px rgba(0,0,0,0.5);
      border: 1px solid var(--border);
      position: relative; height: 100%;
    }
    .img-wrap img { width: 100%; height: 100%; object-fit: cover; object-position: top center; display: block; }
    .img-wrap-side { margin-top: 0; height: 100%; }
    .img-wrap::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(23,16,42,0.45) 0%, transparent 55%);
    }

    @media (max-width: 900px) {
      html, body { overflow: auto; }
      .hero { height: auto; min-height: 100vh; grid-template-columns: 1fr; padding: 100px 28px 60px; gap: 40px; }
      .hero-content { height: auto; }
      .contact-form { margin-top: 32px; }
      .hero-images { height: 55vh; grid-template-columns: 1fr; }
      nav { padding: 20px 24px; }
    }
    @media (max-width: 540px) {
      .hero-images { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <nav>
    <div class="logo">filles.ai</div>
  </nav>

  <section class="hero">
    <div class="hero-content">
      <div class="pill">ce nom de domaine est disponible à la vente</div>
      <h1>
        <span class="domain">filles.ai</span>
        <span class="tagline">Elles font tout ce que vous désirez.</span>
      </h1>
      <form class="contact-form" action="mailto:contact@internet.fr" method="post" enctype="text/plain">
        <input type="email" name="Email" placeholder="Votre adresse email" required />
        <textarea name="Message" rows="4" placeholder="Votre proposition" required></textarea>
        <button type="submit" class="btn-primary">✦ Envoyer</button>
      </form>
    </div>

    <div class="hero-images">      <div class="img-wrap img-wrap-side">
        <img src="img/gallery1.jpg" alt="filles.ai" loading="eager" />
      </div>
    </div>
  </section>
</body>
</html>
